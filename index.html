<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Victoria And Olivia</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <section class="profile-picker" id="profilePicker" aria-labelledby="profile-picker-title">
      <div class="profile-picker-inner">
        <span class="brand-mark profile-rainbow" aria-hidden="true">
          <span class="rainbow-band rainbow-band-red"></span>
          <span class="rainbow-band rainbow-band-sun"></span>
          <span class="rainbow-band rainbow-band-sea"></span>
        </span>
        <p class="eyebrow profile-brand-title">Victoria And Olivia</p>
        <h1 id="profile-picker-title">오늘은 누구의 놀이터로 갈까요?</h1>
        <div class="profile-actions" aria-label="페이지 선택">
          <button class="profile-button" type="button" data-profile-choice="victoria">Victoria</button>
          <button class="profile-button" type="button" data-profile-choice="olivia">Olivia</button>
        </div>
        <p class="profile-note" id="profileChoiceNote" aria-live="polite">Victoria는 우주 게임과 방정식 놀이가 있어요.</p>
      </div>
    </section>
    <script src="src/index.js"></script>
  </body>
</html>
